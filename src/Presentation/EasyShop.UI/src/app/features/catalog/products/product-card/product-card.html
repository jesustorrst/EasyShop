<div class="product-card">
  <div class="card-image-wrapper">
    <!-- @if (product().imageUrl) {
      <img [src]="product().imageUrl" [alt]="product().name" class="product-image" />
    } @else { -->
    <div class="image-placeholder">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="placeholder-icon"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375 0 11-.75 0 .375 0 01.75 0z"
        />
      </svg>
    </div>
    <!-- } -->

    <!-- @if (product().stock <= 0) {
      <span class="stock-badge out-of-stock">Agotado</span>
    } -->
  </div>

  <div class="card-content">
    <!-- <span class="product-category">{{ product().categoryName || 'General' }}</span> -->

    <h3 class="product-title" [title]="product().name">
      {{ product().name }}
    </h3>

    <p class="product-description">
      {{ product().description || 'Sin descripción disponible.' }}
    </p>

    <div class="card-footer">
      <div class="price-container">
        <span class="price-label">Precio</span>
        <span class="product-price">{{
          product().price | currency: 'MXN' : 'symbol' : '1.2-2'
        }}</span>
      </div>

      <div class="card-actions">
        <button
          class="btn-action btn-delete"
          (click)="onDelete(product().id)"
          title="Eliminar producto"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
            class="btn-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"
            />
          </svg>
        </button>

        <!-- <button class="btn-action btn-view" [disabled]="product().stock <= 0" title="Ver detalles">
          <svg
